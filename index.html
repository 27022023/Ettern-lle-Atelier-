<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Atelier Etternélle</title>
<style>
    body {
        margin: 0;
        font-family: 'Cormorant Garamond', serif;
        background-color: #fff;
        scroll-behavior: smooth;
    }

    /* HERO SECTION */
    .hero {
        height: 100vh;
        background-image: url('https://i.pinimg.com/736x/8a/8b/3d/8a8b3d6c3f2c8f1c8b4f5f4c9e8c0e7c.jpg');
        background-size: cover;
        background-position: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: white;
        padding: 20px;
    }

    .hero h1 {
        font-size: 4rem;
        font-family: 'Great Vibes', cursive;
        text-shadow: 0 0 20px rgba(0,0,0,0.4);
        margin: 0;
    }

    .hero p {
        font-size: 1.3rem;
        margin-top: 10px;
        text-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    .glow-btn {
        margin-top: 30px;
        padding: 15px 40px;
        font-size: 1.2rem;
        border: none;
        border-radius: 30px;
        background: linear-gradient(135deg, #f7d7d7, #e7b8b8);
        color: #3a2f2f;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .glow-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    /* MENU SECTION */
    #menu {
        padding: 100px 20px;
        background-color: #fdf8f6;
        text-align: center;
    }

    .mirror-container {
        position: relative;
        width: 300px;
        height: 450px;
        margin: 0 auto;
    }

    /* CSS GOLD MIRROR */
    .mirror {
        width: 100%;
        height: 100%;
        border-radius: 50% / 60%;
        background: radial-gradient(circle at 50% 40%, #ffffff, #d9d9d9);
        border: 15px solid transparent;
        background-clip: padding-box;
        position: relative;
    }

    .mirror::before {
        content: "";
        position: absolute;
        inset: -20px;
        border-radius: 50% / 60%;
        background: linear-gradient(135deg, #d4af37, #f7e7b7, #c89b2b);
        z-index: -1;
    }

    /* CIRCULAR MENU */
    .menu-items {
        position: relative;
        width: 600px;
        height: 600px;
        margin: 50px auto;
    }

    .menu-item {
        position: absolute;
        width: 140px;
        height: 140px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 10px;
        font-size: 1rem;
        color: #3a2f2f;
        transition: 0.3s;
    }

    .menu-item:hover {
        transform: scale(1.1);
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    /* POSITIONING AROUND THE MIRROR */
    .item1 { top: 0; left: 230px; }
    .item2 { top: 120px; left: 450px; }
    .item3 { top: 350px; left: 450px; }
    .item4 { top: 480px; left: 230px; }
    .item5 { top: 350px; left: 10px; }
    .item6 { top: 120px; left: 10px; }
    .item7 { top: 240px; left: 460px; }
    .item8 { top: 240px; left: -20px; }

</style>
</head>
<body>

<!-- HERO SECTION -->
<div class="hero">
    <h1>Atelier Etternélle</h1>
    <p>Timeless beauty, crafted with elegance.</p>
    <a href="#menu"><button class="glow-btn">Let's glow up</button></a>
</div>

<!-- MENU SECTION -->
<section id="menu">
    <div class="mirror-container">
        <div class="mirror"></div>
    </div>

    <div class="menu-items">
        <div class="menu-item item1">Lookbook</div>
        <div class="menu-item item2">Style Helper</div>
        <div class="menu-item item3">Beauty Guide</div>
        <div class="menu-item item4">Shade Finder</div>
        <div class="menu-item item5">Routine Builder</div>
        <div class="menu-item item6">Ingredient Glossary</div>
        <div class="menu-item item7">Moodboards</div>
        <div class="menu-item item8">Journal</div>
    </div>
</section>

</body>
</html>
